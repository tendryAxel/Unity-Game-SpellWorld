name: Unity Build

on:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-

      - name: Get project version
        id: version
        run: |
          VERSION=$(grep -m1 bundleVersion ProjectSettings/ProjectSettings.asset | sed 's/.*: //')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Unity Builder
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: StandaloneWindows64

      - name: Zip build
        run: |
          cd build
          zip -r ../SpellWorld-v${{ steps.version.outputs.version }}-${{ github.ref_name }}.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SpellWorld
          path: SpellWorld-v${{ steps.version.outputs.version }}-${{ github.ref_name }}.zip

      - name: Create GitHub Release
        if: github.ref_name == 'main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: SpellWorld v${{ steps.version.outputs.version }}
          files: SpellWorld-v${{ steps.version.outputs.version }}-${{ github.ref_name }}.zip